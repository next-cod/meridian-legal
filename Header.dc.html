<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
<style>
  [data-nav]{position:relative;color:#AEC8CC;transition:color .22s ease}
  [data-nav]::after{content:"";position:absolute;left:0;right:0;bottom:-4px;height:2px;border-radius:2px;background:#2A8499;transform:scaleX(0);transform-origin:left;transition:transform .3s cubic-bezier(.2,.7,.2,1)}
  [data-nav]:hover{color:#EAF4F5}
  [data-nav]:hover::after{transform:scaleX(1)}
  [data-nav][data-active="true"]{color:#EAF4F5!important}
  [data-nav][data-active="true"]::after{transform:scaleX(1)}
  #hdrBurger{display:none}
  header[data-scrolled="true"]{background:#0E1416!important;border-bottom-color:rgba(225,240,242,0.12)!important;box-shadow:0 10px 36px rgba(0,0,0,0.30)!important}

  /* full-screen numbered mobile nav: fades + slides in, no instant snap */
  #hdrMobile{position:fixed;top:70px;left:0;right:0;bottom:0;z-index:99;display:flex;flex-direction:column;justify-content:space-between;background:#0E1416;padding:8px clamp(20px,6vw,40px) 28px;opacity:0;visibility:hidden;pointer-events:none;transform:translateY(-14px);transition:opacity .26s ease,transform .3s cubic-bezier(.2,.7,.2,1),visibility 0s linear .3s;overflow-y:auto}
  .mnav{display:flex;align-items:baseline;gap:16px;padding:16px 2px;border-bottom:1px solid rgba(225,240,242,.10);color:#DCEAEC;font-size:clamp(23px,7vw,29px);font-weight:600;letter-spacing:-.01em;transition:color .2s ease,padding-left .28s ease}
  .mnav::before{content:attr(data-n);flex:none;font-size:13px;font-weight:700;color:#4E97A6;letter-spacing:.04em}
  .mnav:hover,.mnav:active{color:#fff;padding-left:8px}
  /* animated two-line burger → morphs into an X on open */
  #hdrBurger .bgx{position:relative;width:22px;height:14px;display:block;pointer-events:none}
  #hdrBurger .bgx i{position:absolute;left:0;height:2px;border-radius:2px;background:currentColor;transition:transform .32s cubic-bezier(.2,.7,.2,1),width .32s cubic-bezier(.2,.7,.2,1),top .32s cubic-bezier(.2,.7,.2,1)}
  #hdrBurger .bgx i:nth-child(1){top:1px;width:22px}
  #hdrBurger .bgx i:nth-child(2){top:11px;width:13px}
  #hdrBurger:hover .bgx i:nth-child(2){width:22px}
  #hdrBurger[data-open="true"] .bgx i:nth-child(1){top:6px;width:22px;transform:rotate(45deg)}
  #hdrBurger[data-open="true"] .bgx i:nth-child(2){top:6px;width:22px;transform:rotate(-45deg)}
  @media (max-width:860px){
    #hdrDeskNav,#hdrCta{display:none!important}
    #hdrBurger{display:inline-flex!important}
    #hdrMobile[data-open="true"]{opacity:1;visibility:visible;pointer-events:auto;transform:translateY(0);transition:opacity .26s ease,transform .3s cubic-bezier(.2,.7,.2,1),visibility 0s linear 0s}
  }
</style>
</helmet>
<header data-scrolled="{{ scrolledStr }}" style="position:fixed;top:0;left:0;right:0;z-index:100;background:#12181A;border-bottom:1px solid rgba(225,240,242,0.08);transition:background .3s ease,box-shadow .3s ease,border-color .3s ease;font-family:'Onest',sans-serif">
  <div style="max-width:1240px;margin:0 auto;padding:0 clamp(18px,4vw,40px);height:70px;display:flex;align-items:center;justify-content:space-between;gap:24px">
    <a href="Home.dc.html" style="display:flex;align-items:center;gap:12px">
      <span style="width:31px;height:31px;flex:none;background-color:#2A8499;-webkit-mask:url('images/ic-countries.png') center/contain no-repeat;mask:url('images/ic-countries.png') center/contain no-repeat"></span>
      <span style="font-weight:700;font-size:18px;letter-spacing:.20em;color:#EAF4F5">МЕРИДИАН</span>
    </a>

    <nav id="hdrDeskNav" style="display:flex;align-items:center;gap:30px;font-weight:500;font-size:14.5px">
      <a data-nav data-active="{{ aServices }}" href="Services.dc.html">Услуги</a>
      <a data-nav data-active="{{ aCountries }}" href="Countries.dc.html">Страны</a>
      <a data-nav data-active="{{ aProcess }}" href="Process.dc.html">Как мы работаем</a>
      <a data-nav data-active="{{ aCases }}" href="Cases.dc.html">Кейсы</a>
      <a data-nav data-active="{{ aContacts }}" href="Contacts.dc.html">Контакты</a>
    </nav>

    <a id="hdrCta" href="Contacts.dc.html" style="display:inline-flex;align-items:center;gap:8px;padding:11px 20px;border-radius:7px;background:#0F4C5C;color:#fff;font-weight:600;font-size:14px;transition:background .2s ease,color .2s ease" style-hover="background:#fff !important;color:#0E1416 !important">Бесплатная консультация</a>

    <button id="hdrBurger" data-open="{{ menuOpenStr }}" onClick="{{ toggleMenu }}" aria-label="Меню" style="display:none;width:44px;height:44px;border-radius:11px;border:1px solid rgba(225,240,242,.14);background:transparent;color:#EAF4F5;cursor:pointer;align-items:center;justify-content:center;transition:background .22s ease,border-color .22s ease,color .22s ease" style-hover="background:rgba(15,76,92,.30) !important;border-color:#2A8499 !important;color:#8FD0DC !important">
      <span class="bgx" aria-hidden="true"><i></i><i></i></span>
    </button>
  </div>

  <div id="hdrMobile" data-open="{{ menuOpenStr }}">
    <nav style="display:flex;flex-direction:column;padding-top:8px">
      <a href="Home.dc.html" onClick="{{ closeMenu }}" class="mnav" data-n="00">Главная</a>
      <a href="Services.dc.html" onClick="{{ closeMenu }}" class="mnav" data-n="01">Услуги</a>
      <a href="Countries.dc.html" onClick="{{ closeMenu }}" class="mnav" data-n="02">Страны</a>
      <a href="Process.dc.html" onClick="{{ closeMenu }}" class="mnav" data-n="03">Как мы работаем</a>
      <a href="Cases.dc.html" onClick="{{ closeMenu }}" class="mnav" data-n="04">Кейсы</a>
      <a href="Contacts.dc.html" onClick="{{ closeMenu }}" class="mnav" data-n="05">Контакты</a>
    </nav>
    <div style="padding-top:24px">
      <a href="Contacts.dc.html" onClick="{{ closeMenu }}" style="display:flex;align-items:center;justify-content:center;text-align:center;padding:16px;border-radius:7px;background:#0F4C5C;color:#fff;font-weight:600;font-size:15.5px" style-hover="background:#fff !important;color:#0E1416 !important">Бесплатная консультация</a>
      <div style="margin-top:20px;display:flex;flex-direction:column;gap:8px;font-size:14px;color:#7C9498">
        <span>8 903 217-46-58</span>
        <span>Telegram · @meridian_legal</span>
      </div>
    </div>
  </div>
</header>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:1240,&quot;height&quot;:70},&quot;active&quot;:{&quot;editor&quot;:&quot;enum&quot;,&quot;options&quot;:[&quot;home&quot;,&quot;services&quot;,&quot;countries&quot;,&quot;process&quot;,&quot;cases&quot;,&quot;contacts&quot;],&quot;default&quot;:&quot;home&quot;,&quot;tsType&quot;:&quot;string&quot;}}">
class Component extends DCLogic {
  state = { scrolled:false, menuOpen:false };
  componentDidMount(){
    this._onScroll = () => {
      const s = window.scrollY > 24;
      if (s !== this.state.scrolled) this.setState({ scrolled:s });
    };
    window.addEventListener('scroll', this._onScroll, { passive:true });
  }
  componentWillUnmount(){ window.removeEventListener('scroll', this._onScroll); }
  renderVals(){
    const a = this.props.active || 'home';
    return {
      scrolledStr: this.state.scrolled ? 'true' : 'false',
      menuOpenStr: this.state.menuOpen ? 'true' : 'false',
      toggleMenu: () => this.setState(s => ({ menuOpen: !s.menuOpen })),
      closeMenu: () => this.setState({ menuOpen:false }),
      aServices: a === 'services' ? 'true' : 'false',
      aCountries: a === 'countries' ? 'true' : 'false',
      aProcess: a === 'process' ? 'true' : 'false',
      aCases: a === 'cases' ? 'true' : 'false',
      aContacts: a === 'contacts' ? 'true' : 'false',
    };
  }
}
</script>
</body>
</html>
