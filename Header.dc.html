<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
<style>
  [data-nav]{position:relative;color:#C8BFB0;transition:color .22s ease}
  [data-nav]::after{content:"";position:absolute;left:0;right:0;bottom:-4px;height:2px;border-radius:2px;background:#D29354;transform:scaleX(0);transform-origin:left;transition:transform .3s cubic-bezier(.2,.7,.2,1)}
  [data-nav]:hover{color:#F3EDE3}
  [data-nav]:hover::after{transform:scaleX(1)}
  [data-nav][data-active="true"]{color:#F3EDE3!important}
  [data-nav][data-active="true"]::after{transform:scaleX(1)}
  #hdrMobile{display:none}
  #hdrBurger{display:none}
  header[data-scrolled="true"]{background:rgba(17,14,9,0.97)!important;border-bottom-color:rgba(244,238,227,0.10)!important;box-shadow:0 10px 36px rgba(0,0,0,0.30)!important}
  @media (max-width:860px){
    #hdrDeskNav,#hdrCta{display:none!important}
    #hdrBurger{display:inline-flex!important}
    #hdrMobile[data-open="true"]{display:flex!important}
  }
</style>
</helmet>
<header data-scrolled="{{ scrolledStr }}" style="position:fixed;top:0;left:0;right:0;z-index:100;background:rgba(18,15,10,0.88);backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);border-bottom:1px solid rgba(244,238,227,0.06);transition:background .3s ease,box-shadow .3s ease,border-color .3s ease;font-family:'Onest',sans-serif">
  <div style="max-width:1240px;margin:0 auto;padding:0 clamp(18px,4vw,40px);height:70px;display:flex;align-items:center;justify-content:space-between;gap:24px">
    <a href="Home.dc.html" style="display:flex;align-items:center;gap:12px">
      <span style="width:33px;height:33px;border-radius:50%;border:1.5px solid #BE7B3E;display:inline-flex;align-items:center;justify-content:center;flex:none">
        <svg width="19" height="19" viewBox="0 0 24 24" fill="none" stroke="#D29354" stroke-width="1.4"><circle cx="12" cy="12" r="9"></circle><path d="M3 12h18M12 3c2.6 2.4 4 5.6 4 9s-1.4 6.6-4 9c-2.6-2.4-4-5.6-4-9s1.4-6.6 4-9Z"></path></svg>
      </span>
      <span style="font-weight:700;font-size:18px;letter-spacing:.20em;color:#F3EDE3">МЕРИДИАН</span>
    </a>

    <nav id="hdrDeskNav" style="display:flex;align-items:center;gap:30px;font-weight:500;font-size:14.5px">
      <a data-nav data-active="{{ aServices }}" href="Services.dc.html">Услуги</a>
      <a data-nav data-active="{{ aCountries }}" href="Countries.dc.html">Страны</a>
      <a data-nav data-active="{{ aProcess }}" href="Process.dc.html">Как мы работаем</a>
      <a data-nav data-active="{{ aCases }}" href="Cases.dc.html">Кейсы</a>
      <a data-nav data-active="{{ aContacts }}" href="Contacts.dc.html">Контакты</a>
    </nav>

    <a id="hdrCta" href="Contacts.dc.html" style="display:inline-flex;align-items:center;gap:8px;padding:11px 20px;border-radius:7px;background:#BE7B3E;color:#fff;font-weight:600;font-size:14px;transition:background .2s ease,color .2s ease" style-hover="background:#fff !important;color:#1A140D !important">Бесплатная консультация</a>

    <button id="hdrBurger" onClick="{{ toggleMenu }}" aria-label="Меню" style="display:none;width:42px;height:42px;border-radius:8px;border:1px solid rgba(244,238,227,.18);background:rgba(244,238,227,.04);color:#F3EDE3;cursor:pointer;align-items:center;justify-content:center" style-hover="background:rgba(190,123,62,.20) !important;border-color:#BE7B3E !important;color:#D29354 !important">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><path d="M3 6h18M3 12h18M3 18h18"></path></svg>
    </button>
  </div>

  <div id="hdrMobile" data-open="{{ menuOpenStr }}" style="flex-direction:column;padding:8px 22px 22px;gap:2px;background:rgba(17,14,9,0.99);border-top:1px solid rgba(244,238,227,.08)">
    <a href="Home.dc.html" onClick="{{ closeMenu }}" style="padding:14px 4px;color:#E7DFD2;font-size:16px;border-bottom:1px solid rgba(244,238,227,.07)">Главная</a>
    <a href="Services.dc.html" onClick="{{ closeMenu }}" style="padding:14px 4px;color:#E7DFD2;font-size:16px;border-bottom:1px solid rgba(244,238,227,.07)">Услуги</a>
    <a href="Countries.dc.html" onClick="{{ closeMenu }}" style="padding:14px 4px;color:#E7DFD2;font-size:16px;border-bottom:1px solid rgba(244,238,227,.07)">Страны</a>
    <a href="Process.dc.html" onClick="{{ closeMenu }}" style="padding:14px 4px;color:#E7DFD2;font-size:16px;border-bottom:1px solid rgba(244,238,227,.07)">Как мы работаем</a>
    <a href="Cases.dc.html" onClick="{{ closeMenu }}" style="padding:14px 4px;color:#E7DFD2;font-size:16px;border-bottom:1px solid rgba(244,238,227,.07)">Кейсы</a>
    <a href="Contacts.dc.html" onClick="{{ closeMenu }}" style="padding:14px 4px;color:#E7DFD2;font-size:16px">Контакты</a>
    <a href="Contacts.dc.html" onClick="{{ closeMenu }}" style="margin-top:14px;text-align:center;padding:14px;border-radius:7px;background:#BE7B3E;color:#fff;font-weight:600" style-hover="background:#fff !important;color:#1A140D !important">Бесплатная консультация</a>
  </div>
</header>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:1240,&quot;height&quot;:70},&quot;active&quot;:{&quot;editor&quot;:&quot;enum&quot;,&quot;options&quot;:[&quot;home&quot;,&quot;services&quot;,&quot;countries&quot;,&quot;process&quot;,&quot;cases&quot;,&quot;contacts&quot;],&quot;default&quot;:&quot;home&quot;,&quot;tsType&quot;:&quot;string&quot;}}">
class Component extends DCLogic {
  state = { scrolled:false, menuOpen:false };
  componentDidMount(){
    this._onScroll = () => {
      const s = window.scrollY > 24;
      if (s !== this.state.scrolled) this.setState({ scrolled:s });
    };
    window.addEventListener('scroll', this._onScroll, { passive:true });
  }
  componentWillUnmount(){ window.removeEventListener('scroll', this._onScroll); }
  renderVals(){
    const a = this.props.active || 'home';
    return {
      scrolledStr: this.state.scrolled ? 'true' : 'false',
      menuOpenStr: this.state.menuOpen ? 'true' : 'false',
      toggleMenu: () => this.setState(s => ({ menuOpen: !s.menuOpen })),
      closeMenu: () => this.setState({ menuOpen:false }),
      aServices: a === 'services' ? 'true' : 'false',
      aCountries: a === 'countries' ? 'true' : 'false',
      aProcess: a === 'process' ? 'true' : 'false',
      aCases: a === 'cases' ? 'true' : 'false',
      aContacts: a === 'contacts' ? 'true' : 'false',
    };
  }
}
</script>
</body>
</html>
